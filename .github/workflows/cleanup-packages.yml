name: 🗑️ Cleanup Dev Packages

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete all dev-* package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner
            const packageName = 'heldash'

            // Fetch all versions
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: 'container',
                package_name: packageName,
                username: owner,
                per_page: 100,
              }
            )

            console.log(`Found ${versions.length} total versions`)

            const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000)

            const devVersions = versions.filter(v => {
              const tags = v.metadata?.container?.tags ?? []
              const createdAt = new Date(v.created_at)

              // Always delete dev-* tagged versions
              if (tags.some(tag => tag.startsWith('dev-'))) return true

              // Only delete untagged versions older than 7 days
              // Newer untagged versions are likely attestation layers of recent releases
              if (tags.length === 0 && createdAt < sevenDaysAgo) return true

              return false
            })

            console.log(`Found ${devVersions.length} dev-* and old untagged versions to delete`)

            let deleted = 0
            for (const version of devVersions) {
              const tags = version.metadata?.container?.tags ?? []
              console.log(`Deleting version ${version.id} with tags: ${tags.join(', ')}`)
              try {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: packageName,
                  username: owner,
                  package_version_id: version.id,
                })
                deleted++
              } catch (err) {
                console.error(`Failed to delete version ${version.id}: ${err.message}`)
              }
            }

            console.log(`Deleted ${deleted} of ${devVersions.length} dev-* and old untagged versions`)
            core.summary.addRaw(`## ✅ Cleanup complete\n- Found: ${devVersions.length} dev-* and old untagged versions (>7 days)\n- Deleted: ${deleted}`)
            await core.summary.write()
